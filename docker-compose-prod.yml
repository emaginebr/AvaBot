services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: avachat-api
    restart: unless-stopped
    expose:
      - "80"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__AvachatContext: ${AVACHAT_CONNECTION_STRING}
      OpenAI__ApiKey: ${OPENAI_API_KEY}
    networks:
      - emagine-network

networks:
  emagine-network:
    external: true
